type: object
description: |
  A fee object in API responses. The `fees` array is empty in the Create Payment response —
  subscribe to payment webhook events (recommended) to receive the full fee objects, or poll with a subsequent Get Payment request.
properties:
  id:
    type: string
    description: Unique identifier for this fee. Present when fetching a payment.
    example: pyfee_xyz
  type:
    type: string
    enum: [processing_fee, platform_fee]
    description: |
      The type of fee:
      - `processing_fee`: Fees related to payment processing costs
      - `platform_fee`: Fees for your platform's services
    example: processing_fee
  amount:
    type: integer
    description: Fee amount in cents
    example: 350
  currency:
    type: string
    description: Currency of the fee amount. Present when fetching a payment.
    enum: [usd, cad]
    example: usd
  remaining_amount:
    type: integer
    description: Amount still available for refund in cents. Updates after each partial refund. Present when fetching a payment.
    example: 350
  source_configuration_id:
    type: string
    nullable: true
    description: The public ID of the Standard Fee Configuration used to calculate this fee. Null when the fee was explicitly provided in the payment request rather than auto-calculated.
    example: sfc_abc123
  source_fee_type:
    type: string
    nullable: true
    description: |
      The fee type from the Standard Fee Configuration that generated this fee (e.g., `processing_ecomm`, `amex_brand_ecomm`, `platform`).
      Null when the fee was explicitly provided in the payment request.
    example: amex_brand_ecomm
required: [type, amount]
