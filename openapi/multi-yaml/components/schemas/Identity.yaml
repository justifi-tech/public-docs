type: object
properties:
  name:
    type: string
    example: "Person Name"
    description: legal name
  title:
    type: string
    example: "President"
    description: job title
  email:
    type: string
    example: "person.name@justifi.ai"
    description: email address
  phone:
    type: string
    example: "6124011111"
    description: phone number
  dob_day:
    type: string
    example: "01"
    description: two-digit birth day
  dob_month:
    type: string
    example: "01"
    description: two-digit birth month
  dob_year:
    type: string
    example: "1980"
    description: four-digit birth year (must be at least 18 years old)
  identification_number:
    type: string
    example: "123456789"
    description: full social security number
  is_owner:
    type: boolean
    description: if an identity owns 25% or more of the business, they are considered an owner
  ownership_percentage:
    type: integer
    minimum: 0
    maximum: 100
    example: 25
    description: percentage of the business owned by this identity (0–100); applies when is_owner is true
  metadata:
    type: object
    format: json
    description: any useful information you'd like to store alongside this identity
    additionalProperties: true
    example:
      language: "english"
      social_network: "@person"
  address:
    oneOf:
      - $ref: Address.yaml
      - type: object
        properties:
          id:
            type: string
